<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Registration - Healthcare Portal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .signup-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 40px;
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
      }

      .header p {
        color: #666;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #333;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.3s;
        background: #f8f9fa;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
        background: white;
      }

      .required {
        color: #e74c3c;
      }

      .btn-signup {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }

      .btn-signup:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-signup:active {
        transform: translateY(0);
      }

      .btn-signup:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .login-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
      }

      .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }

      .login-link a:hover {
        text-decoration: underline;
      }

      .alert {
        padding: 12px 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .alert-info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .password-toggle {
        position: relative;
      }

      .password-toggle input {
        padding-right: 45px;
      }

      .password-toggle .toggle-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #666;
        user-select: none;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      @media (max-width: 600px) {
        .signup-container {
          padding: 30px 20px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <div class="header">
        <h1>🏥 Patient Registration</h1>
        <p>
          Create your account to book appointments and access your medical
          records
        </p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="fullName"
            >Full Name <span class="required">*</span></label
          >
          <input
            type="text"
            id="fullName"
            name="fullName"
            required
            placeholder="Enter your full name"
          />
        </div>

        <div class="form-group">
          <label for="email"
            >Email Address <span class="required">*</span></label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="your.email@example.com"
          />
        </div>

        <div class="form-group">
          <label for="mobile"
            >Mobile Number <span class="required">*</span></label
          >
          <input
            type="tel"
            id="mobile"
            name="mobile"
            required
            placeholder="+1234567890"
            pattern="[\+0-9\s\-\(\)]+"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" max="" />
          </div>
        </div>

        <div class="form-group password-toggle">
          <label for="password">Password <span class="required">*</span></label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="Create a strong password"
            minlength="6"
          />
          <span class="toggle-icon" onclick="togglePassword()">👁️</span>
        </div>

        <div class="form-group password-toggle">
          <label for="confirmPassword"
            >Confirm Password <span class="required">*</span></label
          >
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            required
            placeholder="Re-enter your password"
          />
          <span class="toggle-icon" onclick="toggleConfirmPassword()">👁️</span>
        </div>

        <button type="submit" class="btn-signup" id="submitBtn">
          Create Account
        </button>

        <div class="login-link">
          Already have an account?
          <a href="http://147.93.153.249:8081/login">Login here</a>
        </div>
      </form>
    </div>

    <script>
      // Set max date for DOB to today
      document
        .getElementById("dob")
        .setAttribute("max", new Date().toISOString().split("T")[0]);

      function togglePassword() {
        const passwordInput = document.getElementById("password");
        passwordInput.type =
          passwordInput.type === "password" ? "text" : "password";
      }

      function toggleConfirmPassword() {
        const passwordInput = document.getElementById("confirmPassword");
        passwordInput.type =
          passwordInput.type === "password" ? "text" : "password";
      }

      function showAlert(message, type) {
        const alert = document.getElementById("alert");
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
        alert.style.display = "block";

        if (type === "success") {
          setTimeout(() => {
            alert.style.display = "none";
          }, 5000);
        }
      }

      document
        .getElementById("signupForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          const fullName = document.getElementById("fullName").value.trim();
          const email = document.getElementById("email").value.trim();
          const mobile = document.getElementById("mobile").value.trim();
          const gender = document.getElementById("gender").value;
          const dob = document.getElementById("dob").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          // Validation
          if (password !== confirmPassword) {
            showAlert("Passwords do not match!", "error");
            return;
          }

          if (password.length < 6) {
            showAlert("Password must be at least 6 characters long!", "error");
            return;
          }

          // Disable submit button
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<span class="loading"></span> Creating account...';

          try {
            // Call Frappe signup API
            const response = await fetch(
              "http://147.93.153.249:8081/api/method/frappe.core.doctype.user.user.sign_up",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Accept: "application/json",
                },
                body: JSON.stringify({
                  email: email,
                  full_name: fullName,
                  mobile_no: mobile,
                  redirect_to: "/patient-portal",
                }),
              },
            );

            const data = await response.json();

            if (data.message === "success" || response.ok) {
              showAlert(
                "✓ Account created successfully! Redirecting to login...",
                "success",
              );

              // Store data for patient creation (the server script will handle this)
              localStorage.setItem(
                "pendingPatientData",
                JSON.stringify({
                  gender: gender,
                  dob: dob,
                }),
              );

              // Redirect to login page after 2 seconds
              setTimeout(() => {
                window.location.href =
                  "http://147.93.153.249:8081/login?redirect-to=/patient-portal";
              }, 2000);
            } else {
              throw new Error(data.message || "Signup failed");
            }
          } catch (error) {
            console.error("Signup error:", error);
            showAlert(
              `Error: ${error.message || "Failed to create account. Please try again."}`,
              "error",
            );
            submitBtn.disabled = false;
            submitBtn.textContent = "Create Account";
          }
        });

      // Email validation
      document.getElementById("email").addEventListener("blur", function () {
        const email = this.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (email && !emailRegex.test(email)) {
          showAlert("Please enter a valid email address", "error");
        }
      });

      // Mobile validation
      document.getElementById("mobile").addEventListener("blur", function () {
        const mobile = this.value.trim();

        if (mobile && mobile.length < 10) {
          showAlert("Please enter a valid mobile number", "error");
        }
      });
    </script>
  </body>
</html>
